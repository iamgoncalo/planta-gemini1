version: '3.8'

services:
  mqtt-broker:
    image: eclipse-mosquitto:2.0
    container_name: plantaos_mqtt
    ports:
      - "1883:1883"
      - "9001:9001"
    restart: unless-stopped

  influxdb:
    image: influxdb:2.7
    container_name: plantaos_tsdb
    ports:
      - "8086:8086"
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=horse_admin
      - DOCKER_INFLUXDB_INIT_PASSWORD=horse_secure_pass
      - DOCKER_INFLUXDB_INIT_ORG=horse_cft
      - DOCKER_INFLUXDB_INIT_BUCKET=plantaos_sensors
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: plantaos_grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=horse_admin
      - GF_USERS_ALLOW_SIGN_UP=false
    depends_on:
      - influxdb
    restart: unless-stopped
